spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://localhost:5432/JobPortal
    username: postgres
    password: niharika

  jpa:
    hibernate:
      ddl-auto: update #if we keep create here, on every restart of server the old data in tables will be removed, so just use update as the ddl command functionality
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  web:
